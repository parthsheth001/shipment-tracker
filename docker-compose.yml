services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: shipment_db
      POSTGRES_USER: shipment_user
      POSTGRES_PASSWORD: shipment_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: shipment_user
      RABBITMQ_DEFAULT_PASS: shipment_pass
    ports:
      - "5672:5672"    # RabbitMQ main port
      - "15672:15672"  # Management dashboard

volumes:
  postgres_data: