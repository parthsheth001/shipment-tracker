services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: shipment_db
      POSTGRES_USER: shipment_user
      POSTGRES_PASSWORD: shipment_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
