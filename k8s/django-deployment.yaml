apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-deployment
  namespace: shipment-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: django
  template:
    metadata:
      labels:
        app: django
    spec:
      containers:
        - name: django
          image: shipment-tracker:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: shipment-config
            - secretRef:
                name: shipment-secrets
          readinessProbe:
            httpGet:
              path: /api/shipments/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: django-service
  namespace: shipment-tracker
spec:
  selector:
    app: django
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer