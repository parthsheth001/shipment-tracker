apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-deployment
  namespace: shipment-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery
  template:
    metadata:
      labels:
        app: celery
    spec:
      containers:
        - name: celery
          image: shipment-tracker:latest
          command: ["celery", "-A", "core", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: shipment-config
            - secretRef:
                name: shipment-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"